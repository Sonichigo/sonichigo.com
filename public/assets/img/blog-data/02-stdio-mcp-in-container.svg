<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#999999"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="420" fill="#ffffff"/>

  <text x="480" y="34" font-size="15" font-weight="600" fill="#333333" text-anchor="middle">Example 1 — stdio transport: the client spawns a micro-VM instead of a bare process</text>

  <!-- Claude Desktop (client) -->
  <rect x="42" y="120" width="200" height="130" rx="8" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.5"/>
  <text x="142" y="152" font-size="13" font-weight="600" fill="#7A4E00" text-anchor="middle">Claude Desktop</text>
  <text x="142" y="172" font-size="11" fill="#7A4E00" text-anchor="middle">MCP client · stdio</text>
  <line x1="60" y1="186" x2="224" y2="186" stroke="#D79B00" stroke-width="1" opacity="0.5"/>
  <text x="142" y="206" font-size="10" font-family="Menlo, Consolas, monospace" fill="#7A4E00" text-anchor="middle">"command":</text>
  <text x="142" y="222" font-size="10" font-family="Menlo, Consolas, monospace" fill="#7A4E00" text-anchor="middle">/usr/local/bin/container</text>
  <text x="142" y="238" font-size="9.5" fill="#A66B00" text-anchor="middle">full path — GUI apps ignore your PATH</text>

  <!-- spawn arrow -->
  <line x1="242" y1="150" x2="428" y2="150" stroke="#4A4A4A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="335" y="120" font-size="11.5" font-weight="600" fill="#4A4A4A" text-anchor="middle">spawns per session</text>
  <text x="335" y="138" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#666666" text-anchor="middle">container run -i --rm ops-toolbox</text>

  <!-- micro-VM -->
  <rect x="432" y="70" width="410" height="240" rx="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="637" y="94" font-size="12" font-weight="600" fill="#3D5C3A" text-anchor="middle">micro-VM — own kernel, boots in &lt;1s, discarded on exit (--rm)</text>

  <!-- container inside VM -->
  <rect x="462" y="110" width="350" height="160" rx="6" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="637" y="136" font-size="12.5" font-weight="600" fill="#2F4D71" text-anchor="middle">ops-toolbox container</text>
  <text x="637" y="156" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#4A6892" text-anchor="middle">python server.py · FastMCP · transport="stdio"</text>
  <line x1="482" y1="170" x2="792" y2="170" stroke="#6C8EBF" stroke-width="1" opacity="0.5"/>
  <text x="637" y="192" font-size="10.5" fill="#4A6892" text-anchor="middle">tools: check_migration_name · estimate_blast_radius</text>
  <text x="637" y="214" font-size="10.5" fill="#4A6892" text-anchor="middle">no host filesystem · no host network</text>
  <text x="637" y="232" font-size="10.5" fill="#4A6892" text-anchor="middle">unless explicitly mounted / granted</text>
  <text x="637" y="256" font-size="10" font-weight="600" fill="#2E6B2E" text-anchor="middle">default posture: can touch nothing</text>

  <!-- stdin arrow (client -> container) -->
  <line x1="242" y1="290" x2="460" y2="290" stroke="#4A4A4A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="350" y="280" font-size="11" fill="#4A4A4A" text-anchor="middle">JSON-RPC requests → stdin</text>

  <!-- stdout arrow (container -> client) -->
  <line x1="460" y1="330" x2="244" y2="330" stroke="#4A4A4A" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="350" y="352" font-size="11" fill="#4A4A4A" text-anchor="middle">JSON-RPC responses ← stdout</text>
  <text x="350" y="308" font-size="10" font-style="italic" fill="#888888" text-anchor="middle">-i keeps stdin attached — the transport's lifeline</text>

  <!-- stderr to logs -->
  <line x1="842" y1="190" x2="878" y2="190" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="878" y1="190" x2="878" y2="330" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="878" y1="330" x2="800" y2="330" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>
  <rect x="620" y="330" width="178" height="40" rx="6" fill="#F5F5F5" stroke="#999999" stroke-width="1.5"/>
  <text x="709" y="349" font-size="11" font-weight="600" fill="#666666" text-anchor="middle">container logs</text>
  <text x="709" y="363" font-size="10" fill="#888888" text-anchor="middle">stderr only</text>

  <!-- rule note -->
  <rect x="42" y="376" width="430" height="34" rx="6" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  <text x="257" y="397" font-size="11" fill="#7A6200" text-anchor="middle">Rule: stdout carries protocol only — one stray print() corrupts the stream</text>
</svg>
