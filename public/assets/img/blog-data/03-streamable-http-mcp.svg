<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#4A4A4A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#6C8EBF"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="500" fill="#ffffff"/>

  <text x="480" y="34" font-size="15" font-weight="600" fill="#333333" text-anchor="middle">Example 2 — Streamable HTTP: two ways to reach the server</text>

  <!-- MCP client -->
  <rect x="42" y="150" width="190" height="120" rx="8" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.5"/>
  <text x="137" y="184" font-size="13" font-weight="600" fill="#7A4E00" text-anchor="middle">MCP client</text>
  <text x="137" y="204" font-size="11" fill="#7A4E00" text-anchor="middle">claude mcp add / curl</text>
  <line x1="60" y1="218" x2="214" y2="218" stroke="#D79B00" stroke-width="1" opacity="0.5"/>
  <text x="137" y="240" font-size="10.5" fill="#7A4E00" text-anchor="middle">POST · JSON-RPC 2.0</text>
  <text x="137" y="256" font-size="10.5" fill="#7A4E00" text-anchor="middle">SSE mode when server streams</text>

  <!-- macOS host boundary -->
  <rect x="420" y="66" width="500" height="330" rx="8" fill="#F7F7F7" stroke="#999999" stroke-width="1.5"/>
  <text x="438" y="90" font-size="12" font-weight="600" fill="#666666">macOS host</text>

  <!-- micro-VM -->
  <rect x="558" y="106" width="332" height="262" rx="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
  <text x="724" y="130" font-size="12" font-weight="600" fill="#3D5C3A" text-anchor="middle">micro-VM · dedicated IP 192.168.64.3</text>

  <!-- container -->
  <rect x="582" y="146" width="284" height="170" rx="6" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
  <text x="724" y="172" font-size="12.5" font-weight="600" fill="#2F4D71" text-anchor="middle">ops-toolbox-http container</text>
  <text x="724" y="192" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#4A6892" text-anchor="middle">FastMCP · transport="streamable-http"</text>
  <line x1="602" y1="206" x2="846" y2="206" stroke="#6C8EBF" stroke-width="1" opacity="0.5"/>
  <text x="724" y="228" font-size="11" font-family="Menlo, Consolas, monospace" fill="#4A6892" text-anchor="middle">bind 0.0.0.0:8000</text>
  <text x="724" y="248" font-size="11" font-family="Menlo, Consolas, monospace" fill="#4A6892" text-anchor="middle">endpoint: POST /mcp</text>
  <text x="724" y="274" font-size="10" fill="#B85450" text-anchor="middle">binding 127.0.0.1 = reachable only inside</text>
  <text x="724" y="290" font-size="10" fill="#B85450" text-anchor="middle">this VM — the classic mistake</text>

  <text x="724" y="348" font-size="10" font-style="italic" fill="#3D5C3A" text-anchor="middle">run 5 servers on :8000 — 5 IPs, zero port conflicts</text>

  <!-- published port node on host boundary -->
  <rect x="360" y="150" width="120" height="46" rx="6" fill="#FFFFFF" stroke="#6C8EBF" stroke-width="1.8"/>
  <text x="420" y="169" font-size="11" font-weight="600" font-family="Menlo, Consolas, monospace" fill="#2F4D71" text-anchor="middle">-p 8000:8000</text>
  <text x="420" y="186" font-size="9.5" fill="#4A6892" text-anchor="middle">published port</text>

  <!-- Path A: via localhost -->
  <line x1="232" y1="173" x2="356" y2="173" stroke="#4A4A4A" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <line x1="480" y1="173" x2="578" y2="173" stroke="#4A4A4A" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="294" y="140" font-size="11" font-weight="600" fill="#4A4A4A" text-anchor="middle">Path A</text>
  <text x="294" y="158" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#666666" text-anchor="middle">http://localhost:8000/mcp</text>
  <text x="294" y="192" font-size="9.5" font-style="italic" fill="#888888" text-anchor="middle">flags before the image name!</text>

  <!-- Path B: direct to container IP (dashed) -->
  <path d="M 137 270 L 137 330 L 554 330" fill="none" stroke="#6C8EBF" stroke-width="1.8" stroke-dasharray="7,5" marker-end="url(#arrowBlue)"/>
  <text x="300" y="318" font-size="11" font-weight="600" fill="#2F4D71" text-anchor="middle">Path B — no publish needed</text>
  <text x="300" y="348" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#4A6892" text-anchor="middle">http://192.168.64.3:8000/mcp</text>
  <text x="300" y="364" font-size="9.5" font-style="italic" fill="#4A6892" text-anchor="middle">container's own IP · find it via `container ls`</text>

  <!-- firewall warning -->
  <rect x="42" y="416" width="560" height="66" rx="6" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  <text x="60" y="440" font-size="11.5" font-weight="600" fill="#7A6200">⚠ macOS Local Network firewall</text>
  <text x="60" y="458" font-size="10.5" fill="#7A6200">Symptom: curl: (52) Empty reply from server — with nothing wrong in the container.</text>
  <text x="60" y="474" font-size="10.5" fill="#7A6200">Fix: Privacy &amp; Security → Local Network → allow your terminal AND container-runtime-linux.</text>

  <!-- subnet note -->
  <rect x="632" y="416" width="288" height="66" rx="6" fill="#F5F5F5" stroke="#999999" stroke-width="1.5"/>
  <text x="776" y="440" font-size="11" font-weight="600" fill="#666666" text-anchor="middle">Networking model</text>
  <text x="776" y="458" font-size="10.5" fill="#777777" text-anchor="middle">every container = its own VM = its own IP</text>
  <text x="776" y="474" font-size="10.5" font-family="Menlo, Consolas, monospace" fill="#777777" text-anchor="middle">private subnet 192.168.64.0/24</text>
</svg>
